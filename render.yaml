services:
  - type: web
    name: google-review-scraper
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    envVars:
      - key: SCRAPER_API_KEY
        generateValue: true
      - key: MAX_CONCURRENT_SESSIONS
        value: "2"
    healthCheckPath: /health
